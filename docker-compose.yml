version: "3.9"

# =============================================================
# Binance Kafka Pipeline — Infrastructure
# =============================================================
# Services:
#   zookeeper   — Kafka cluster coordinator
#   kafka       — Message broker
#   kafka-init  — One-shot container that creates topics on startup
#   kafka-ui    — Web UI at http://localhost:8080
#
# Usage:
#   docker-compose up -d
#   docker-compose logs -f kafka
#   docker-compose down -v   # remove volumes (all data)
# =============================================================

services:

  # -----------------------------------------------------------
  # Zookeeper — required by Kafka for cluster coordination
  # -----------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log

  # -----------------------------------------------------------
  # Kafka broker
  # -----------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"       # host access for producer / consumer
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # Two listeners:
      #   PLAINTEXT     — internal Docker network (container-to-container)
      #   PLAINTEXT_HOST — host machine (localhost:9092)
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Single-node setup — no replication needed
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # Retention: keep 7 days or 10 GB per topic, whichever comes first
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 10737418240   # 10 GB
      KAFKA_LOG_SEGMENT_BYTES: 1073741824      # 1 GB per segment

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"  # topics created explicitly below
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    volumes:
      - kafka-data:/var/lib/kafka/data

  # -----------------------------------------------------------
  # kafka-init — creates topics once on first startup
  # -----------------------------------------------------------
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    # Runs once and exits — not a long-running service
    restart: "no"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Creating Kafka topics..."

        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic btcusdt_trades \
          --partitions 3 \
          --replication-factor 1 \
          --config retention.ms=604800000

        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic ethusdt_trades \
          --partitions 3 \
          --replication-factor 1 \
          --config retention.ms=604800000

        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic solusdt_trades \
          --partitions 3 \
          --replication-factor 1 \
          --config retention.ms=604800000

        echo "Topics created:"
        kafka-topics --bootstrap-server kafka:29092 --list

  # -----------------------------------------------------------
  # Kafka UI — browse topics and messages at http://localhost:8080
  # -----------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

# =============================================================
# Named volumes — data persists across docker-compose restarts
# =============================================================
volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data: